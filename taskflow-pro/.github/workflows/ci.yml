name: TaskFlow Pro CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres-auth:
        image: postgres:15
        env:
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: auth_password
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres-task:
        image: postgres:15
        env:
          POSTGRES_USER: task_user
          POSTGRES_PASSWORD: task_password
          POSTGRES_DB: task_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
    
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Build Auth Service
      run: cd taskflow-pro/backend/auth-service && mvn clean install -DskipTests
    
    - name: Build Task Service
      run: cd taskflow-pro/backend/task-service && mvn clean install -DskipTests

    - name: Build Notification Service
      run: cd taskflow-pro/backend/notification-service && mvn clean install -DskipTests

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install and Build Frontend
      run: |
        cd taskflow-pro/frontend/taskflow-frontend
        npm install
        npm run build
